<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HN Reader</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header>
    <div class="brand">
      <span class="logo">Y</span>
      <span class="brand-name">HN Reader</span>
    </div>
    <nav class="modes">
      <button class="mode-btn active" data-mode="top">top</button>
      <button class="mode-btn" data-mode="new">new</button>
      <button class="mode-btn" data-mode="best">best</button>
      <button class="mode-btn" data-mode="comments">comments</button>
      <button class="mode-btn" data-mode="ask">ask</button>
      <button class="mode-btn" data-mode="show">show</button>
      <button class="mode-btn" data-mode="job">job</button>
      <button class="mode-btn mode-btn--doom" data-mode="doom">&#128293; doom</button>
    </nav>
  </header>

  <main>
    <div id="loading" class="loading" hidden>
      <div class="spinner"></div>
      <p>Loading…</p>
    </div>

    <div id="error" class="error" hidden>
      <p id="error-msg"></p>
      <button id="retry-btn">Retry</button>
    </div>

    <article id="card" class="card" hidden>
      <div class="card-meta">
        <span id="card-index" class="card-index"></span>
        <span id="card-type" class="card-type"></span>
      </div>

      <h1 id="card-title" class="card-title"></h1>

      <div class="card-url-row">
        <a id="card-url" class="card-url" href="#" target="_blank" rel="noopener noreferrer" hidden></a>
      </div>

      <div class="card-info">
        <span id="card-score" class="info-chip score"></span>
        <span id="card-author" class="info-chip author"></span>
        <span id="card-time" class="info-chip time"></span>
        <a id="card-comments" class="info-chip comments" href="#" target="_blank" rel="noopener noreferrer"></a>
      </div>

      <div id="card-text" class="card-text" hidden></div>
    </article>

    <nav class="nav-controls" id="nav-controls" hidden>
      <button id="prev-btn" class="nav-btn" title="Previous (← or h/k)">&#8592; prev</button>
      <div class="progress-bar">
        <div id="progress-fill" class="progress-fill"></div>
      </div>
      <button id="next-btn" class="nav-btn" title="Next (→ or j/l)">next &#8594;</button>
    </nav>

    <!-- ── Doom scroll view ────────────────────────────────────────────── -->
    <div id="doom-view" class="doom-view" hidden>
      <div class="doom-tabs-bar">
        <button class="doom-tab active" data-doom="sequential">Sequential</button>
        <button class="doom-tab" data-doom="mix">Mix</button>
      </div>
      <div id="doom-feed" class="doom-feed">
        <!-- posts injected by JS before doom-more -->
        <div id="doom-more" class="doom-more">
          <div class="spinner"></div>
        </div>
      </div>
    </div>
  </main>

  <footer>
    <span>&#8592; &#8594; &nbsp;/&nbsp; <kbd>h</kbd><kbd>j</kbd><kbd>k</kbd><kbd>l</kbd> navigate &nbsp;·&nbsp; <kbd>o</kbd> open article &nbsp;·&nbsp; <kbd>c</kbd> open comments</span>
  </footer>

  <div id="sr-announce" class="sr-only" aria-live="polite" aria-atomic="true"></div>

  <noscript>
    <div class="noscript-msg">JavaScript is required to use HN Reader.</div>
  </noscript>

  <script src="app.js"></script>
</body>
</html>
